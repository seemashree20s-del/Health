<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSymphony | Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="themes.css">
    <script src="themeManager.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 1rem;
        }
        .login-wrapper {
            padding: 3rem;
            width: 100%; max-width: 450px;
            text-align: center;
        }
        .login-wrapper:hover { box-shadow: 0 25px 50px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
        
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        
        .input-group { text-align: left; margin-bottom: 1.2rem; position: relative; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main); }
        .input-field {
            width: 100%; padding: 0.9rem 1rem;
            font-size: 1rem; font-family: 'Inter', sans-serif;
        }
        .toggle-pwd { position: absolute; right: 1rem; top: 2.3rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .toggle-pwd:hover { color: var(--accent); }

        .btn-primary { width: 100%; padding: 1rem; font-weight: 600; font-size: 1rem; margin-top: 1rem; }
        
        .error-msg { color: #ef4444; font-size: 0.85rem; min-height: 1.2rem; margin-top: 0.5rem; display: block; text-align: left; font-weight: 500; }
        .auth-footer { margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        
        .back-nav { position: absolute; top: 1.5rem; left: 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; display:flex; align-items:center; gap:0.5rem; transition: color 0.2s; }
        .back-nav:hover { color: var(--accent); }
    </style>
</head>
<body>
    <a href="home.html" class="back-nav"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    
    <div class="login-wrapper glass-panel">
        <div class="logo"><i class="fa-solid fa-notes-medical gradient-text-universal"></i> <span class="gradient-text-universal">HealthSymphony</span></div>
        <p class="subtitle">Securely access your health profile</p>
        
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="input-field u-input" placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-field u-input" placeholder="••••••••">
                <i class="fa-solid fa-eye-slash toggle-pwd" id="toggle-icon" onclick="togglePassword()"></i>
                <span id="auth-error" class="error-msg"></span>
            </div>
            
            <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 1rem;">
            <a href="forgot_password.html" style="font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 500;">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn-primary u-btn" id="submit-btn">Sign In to Dashboard</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create free account</a>
        </div>
    </div>

    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAgJ01RHrpzywI_EG2whluBDyj7kGvlQLw",
          authDomain: "healthcare-chatbot-8b131.firebaseapp.com",
          databaseURL: "https://healthcare-chatbot-8b131-default-rtdb.asia-southeast1.firebasedatabase.app/",
          projectId: "healthcare-chatbot-8b131",
          storageBucket: "healthcare-chatbot-8b131.firebasestorage.app",
          messagingSenderId: "414500073416",
          appId: "1:414500073416:web:a22115813f5e96922edafd",
          measurementId: "G-B7KM52WJP0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.firebaseLoginUser = async function(email, password) {
            // Create a timeout promise to prevent hanging
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error("Firebase connection timed out")), 5000)
            );

            try {
                return await Promise.race([
                    (async () => {
                        const usersRef = db.ref('users');
                        const snapshot = await usersRef.orderByChild('email').equalTo(email).once('value');
                        
                        if (!snapshot.exists()) {
                            throw new Error("Invalid username or password.");
                        }
                        
                        let foundUser = null;
                        snapshot.forEach((childSnapshot) => {
                            const user = childSnapshot.val();
                            if (user.password === password) {
                                foundUser = { id: childSnapshot.key, ...user };
                            }
                        });

                        if (!foundUser) {
                            throw new Error("Invalid username or password.");
                        }
                        return foundUser;
                    })(),
                    timeoutPromise
                ]);
            } catch (error) {
                if (error.message === "Invalid username or password.") throw error;
                
                // Fallback to LocalStorage if Firebase fails/hangs
                console.warn("Firebase failed, using local storage fallback:", error);
                let users = JSON.parse(localStorage.getItem('hs_users') || '[]');
                const user = users.find(u => u.email === email && u.password === password);
                if (!user) {
                    throw new Error("Invalid username or password.");
                }
                return user;
            }
        };
    </script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fa-solid fa-eye toggle-pwd';
            } else {
                pwd.type = 'password';
                icon.className = 'fa-solid fa-eye-slash toggle-pwd';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('auth-error');
            const submitBtn = document.getElementById('submit-btn');
            
            errEl.innerText = '';
            
            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                
                if (!email || !password) {
                    errEl.innerText = '* Please enter both email and password.';
                    return shakeWrap();
                }

                if (!window.firebaseLoginUser) {
                    errEl.innerText = '* Services are loading, please try again.';
                    return shakeWrap();
                }
                
                submitBtn.innerText = 'Signing In...';
                submitBtn.disabled = true;

                const user = await window.firebaseLoginUser(email, password);
                
                localStorage.setItem('hs_currentUser', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    email: user.email,
                    isPremium: user.isPremium || false,
                    plan: user.plan || null
                }));
                window.location.href = 'chat.html';
            } catch(error) {
                submitBtn.innerText = 'Sign In to Dashboard';
                submitBtn.disabled = false;
                errEl.innerText = '* Invalid username or password.';
                shakeWrap();
            }
        }

        function shakeWrap() {
            const wrap = document.querySelector('.login-wrapper');
            wrap.style.transform = 'translateX(-10px)';
            setTimeout(()=> wrap.style.transform = 'translateX(10px)', 100);
            setTimeout(()=> wrap.style.transform = 'translateX(0)', 200);
        }
    </script>
</body>
</html>
