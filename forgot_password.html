<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSymphony | Forgot Password</title>
    <!-- Include Bootstrap 4 as requested, alongside custom themes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="themes.css">
    <script src="themeManager.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 1rem;
            background: var(--bg-body);
            color: var(--text-main);
        }
        .login-wrapper {
            padding: 3rem;
            width: 100%; max-width: 450px;
            text-align: center;
            background: var(--bg-surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .login-wrapper:hover { box-shadow: 0 25px 50px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
        
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        
        .input-group-custom { text-align: left; margin-bottom: 1.2rem; position: relative; }
        .input-group-custom label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main); }
        .input-field {
            width: 100%; padding: 0.9rem 1rem;
            font-size: 1rem; font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: var(--text-main);
        }
        
        .btn-primary-custom { 
            width: 100%; padding: 1rem; font-weight: 600; font-size: 1rem; margin-top: 1rem; 
            background: var(--gradient-primary); color: white; border: none; border-radius: 20px;
            cursor: pointer; box-shadow: var(--shadow-sm); transition: transform 0.3s ease;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); }
        
        .error-msg { color: #ef4444; font-size: 0.85rem; min-height: 1.2rem; margin-top: 0.5rem; display: block; text-align: left; font-weight: 500; }
        .success-msg { color: #10b981; font-size: 0.85rem; min-height: 1.2rem; margin-top: 0.5rem; display: block; text-align: left; font-weight: 500; }

        .auth-footer { margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        
        .back-nav { position: absolute; top: 1.5rem; left: 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; display:flex; align-items:center; gap:0.5rem; transition: color 0.2s; }
        .back-nav:hover { color: var(--accent); }

        #step2 { display: none; }
    </style>
</head>
<body>
    <a href="login.html" class="back-nav"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
    
    <div class="login-wrapper glass-panel">
        <div class="logo"><i class="fa-solid fa-notes-medical gradient-text-universal"></i> <span class="gradient-text-universal">HealthSymphony</span></div>
        <p class="subtitle">Reset your password via SMS OTP</p>
        
        <!-- Step 1: Request OTP -->
        <div id="step1">
            <form onsubmit="requestOTP(event)">
                <div class="input-group-custom">
                    <label for="phone">Registered Phone Number</label>
                    <input type="text" id="phone" class="input-field u-input" placeholder="+1234567890" required>
                    <small class="text-muted mt-1 d-block">A 4-digit OTP will be sent via SMS.</small>
                </div>
                <span id="step1-msg" class="error-msg"></span>
                <button type="submit" class="btn-primary-custom u-btn" id="btn-request">Send SMS OTP</button>
            </form>
        </div>

        <!-- Step 2: Verify OTP & Reset -->
        <div id="step2">
            <form onsubmit="verifyOTP(event)">
                <div class="input-group-custom">
                    <label for="otp">4-Digit OTP</label>
                    <input type="text" id="otp" class="input-field u-input" placeholder="e.g. 1234" maxlength="4" required>
                </div>
                <div class="input-group-custom">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" class="input-field u-input" placeholder="••••••••" required>
                </div>
                <span id="step2-msg" class="error-msg"></span>
                <button type="submit" class="btn-primary-custom u-btn" id="btn-verify">Reset Password</button>
            </form>
        </div>
    </div>

    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAgJ01RHrpzywI_EG2whluBDyj7kGvlQLw",
          authDomain: "healthcare-chatbot-8b131.firebaseapp.com",
          databaseURL: "https://healthcare-chatbot-8b131-default-rtdb.asia-southeast1.firebasedatabase.app/",
          projectId: "healthcare-chatbot-8b131",
          storageBucket: "healthcare-chatbot-8b131.firebasestorage.app",
          messagingSenderId: "414500073416",
          appId: "1:414500073416:web:a22115813f5e96922edafd",
          measurementId: "G-B7KM52WJP0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <script>
        let resetUserId = null;
        let generatedOTP = "1234"; // Simulated OTP

        async function requestOTP(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const msgEl = document.getElementById('step1-msg');
            const btn = document.getElementById('btn-request');
            
            btn.disabled = true;
            btn.innerText = 'Searching Database...';
            msgEl.className = 'error-msg';
            msgEl.innerText = '';
            
            try {
                const snapshot = await db.ref('users').orderByChild('phone').equalTo(phone).once('value');
                
                if(snapshot.exists()) {
                    snapshot.forEach(child => { resetUserId = child.key; });
                    
                    // Generate random 4-digit OTP
                    generatedOTP = String(Math.floor(1000 + Math.random() * 9000));
                    
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('step2-msg').className = 'success-msg';
                    document.getElementById('step2-msg').innerText = `Phone verified! Use OTP: ${generatedOTP} to reset your password.`;
                } else {
                    msgEl.innerText = 'No account found with this phone number.';
                }
            } catch(error) {
                msgEl.innerText = 'Database connection failed. Please try again.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send SMS OTP';
            }
        }

        async function verifyOTP(e) {
            e.preventDefault();
            const otp = document.getElementById('otp').value.trim();
            const new_password = document.getElementById('new_password').value.trim();
            const msgEl = document.getElementById('step2-msg');
            const btn = document.getElementById('btn-verify');
            
            if(otp !== generatedOTP) {
                msgEl.className = 'error-msg';
                msgEl.innerText = `Invalid OTP. Please use ${generatedOTP}.`;
                return;
            }
            
            btn.disabled = true;
            btn.innerText = 'Updating Password...';
            msgEl.className = 'error-msg';
            msgEl.innerText = '';
            
            try {
                await db.ref('users/' + resetUserId).update({ password: new_password });
                msgEl.className = 'success-msg';
                msgEl.innerText = 'Password successfully reset! Redirecting to login...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch(error) {
                msgEl.innerText = 'Failed to update password in database.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        }
    </script>
</body>
</html>
